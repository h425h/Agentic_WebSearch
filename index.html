<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cerebro Search</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo { font-size: 45px; font-weight: bold; margin-bottom: 30px; color: #4285F4; }
        .search-box { width: 500px; padding: 12px 20px; font-size: 16px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        .btn { margin-top: 20px; padding: 10px 20px; background-color: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
        <img src="static/cerebro-logo.png" alt="Cerebro Logo" style="width: 125px; margin-bottom: 30px;">
	<div class="logo"> Cerebro</div>
        <form action="/search" method="GET" style="text-align: center;">
            <input type="text" name="q" class="search-box" placeholder="Search..." required>
            <br>
            <button type="submit" class="btn">Search</button>
        </form>
</body>
</html>
